name: Manual Deploy

"on":
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment target
        required: true
        type: choice
        options:
          - canary
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.ssh"
          chmod 700 "${HOME}/.ssh"
          printf '%s\n' "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > "${HOME}/.ssh/id_ed25519"
          chmod 600 "${HOME}/.ssh/id_ed25519"

      - name: Prepare deployment bundle
        shell: bash
        env:
          DEPLOY_CODEGRAPH_QDRANT_NETWORK: ${{ secrets.DEPLOY_CODEGRAPH_QDRANT_NETWORK }}
          DEPLOY_OPSBRAIN_QDRANT_NETWORK: ${{ secrets.DEPLOY_OPSBRAIN_QDRANT_NETWORK }}
          DEPLOY_CODEGRAPH_QDRANT_API_KEY: ${{ secrets.DEPLOY_CODEGRAPH_QDRANT_API_KEY }}
          DEPLOY_OPSBRAIN_QDRANT_API_KEY: ${{ secrets.DEPLOY_OPSBRAIN_QDRANT_API_KEY }}
        run: |
          set -euo pipefail
          : "${DEPLOY_CODEGRAPH_QDRANT_NETWORK:?set DEPLOY_CODEGRAPH_QDRANT_NETWORK environment secret}"
          : "${DEPLOY_OPSBRAIN_QDRANT_NETWORK:?set DEPLOY_OPSBRAIN_QDRANT_NETWORK environment secret}"
          : "${DEPLOY_CODEGRAPH_QDRANT_API_KEY:?set DEPLOY_CODEGRAPH_QDRANT_API_KEY environment secret}"
          : "${DEPLOY_OPSBRAIN_QDRANT_API_KEY:?set DEPLOY_OPSBRAIN_QDRANT_API_KEY environment secret}"
          deploy_env="${{ inputs.environment }}"
          bundle_root="${RUNNER_TEMP}/bundle"
          mkdir -p "${bundle_root}/envs/${deploy_env}" "${bundle_root}/secrets"
          cp compose.yml "${bundle_root}/compose.yml"
          cp "envs/${deploy_env}/.env.qdrant" "${bundle_root}/envs/${deploy_env}/.env.qdrant"
          cat > "${bundle_root}/envs/${deploy_env}/.env.deploy" <<EOF
          MAKEPAD_QDRANT_CODEGRAPH_NETWORK=${DEPLOY_CODEGRAPH_QDRANT_NETWORK}
          MAKEPAD_QDRANT_OPSBRAIN_NETWORK=${DEPLOY_OPSBRAIN_QDRANT_NETWORK}
          EOF
          cat > "${bundle_root}/secrets/codegraph.env" <<EOF
          QDRANT__SERVICE__API_KEY=${DEPLOY_CODEGRAPH_QDRANT_API_KEY}
          EOF
          cat > "${bundle_root}/secrets/opsbrain.env" <<EOF
          QDRANT__SERVICE__API_KEY=${DEPLOY_OPSBRAIN_QDRANT_API_KEY}
          EOF
          chmod 600 "${bundle_root}/secrets/codegraph.env" "${bundle_root}/secrets/opsbrain.env"

      - name: Deploy via standalone Docker Compose
        shell: bash
        env:
          REMOTE_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          REMOTE_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          REMOTE_USER: ${{ secrets.DEPLOY_SSH_USER }}
          REMOTE_DIR: ${{ secrets.DEPLOY_REMOTE_DIR }}
          REMOTE_CONFIG_DIR: ${{ secrets.DEPLOY_REMOTE_CONFIG_DIR }}
        run: |
          set -euo pipefail
          : "${REMOTE_HOST:?}" "${REMOTE_USER:?}" "${REMOTE_DIR:?}"
          if [[ "${REMOTE_USER}" == "root" ]]; then
            echo "DEPLOY_SSH_USER must not be root." >&2
            exit 1
          fi
          bundle_root="${RUNNER_TEMP}/bundle"
          remote_port=${REMOTE_PORT:-22}
          ssh_opts=(-o StrictHostKeyChecking=accept-new -p "${remote_port}")
          scp_opts=(-o StrictHostKeyChecking=accept-new -P "${remote_port}")
          remote_target="${REMOTE_USER}@${REMOTE_HOST}"
          remote_config_dir="${REMOTE_CONFIG_DIR:-/etc/makepad/qdrant}"

          ssh "${ssh_opts[@]}" "${remote_target}" mkdir -p "${REMOTE_DIR}/envs/${{ inputs.environment }}"
          scp "${scp_opts[@]}" "${bundle_root}/compose.yml" "${remote_target}:${REMOTE_DIR}/compose.yml"
          scp "${scp_opts[@]}" "${bundle_root}/envs/${{ inputs.environment }}/.env.qdrant" "${remote_target}:${REMOTE_DIR}/envs/${{ inputs.environment }}/.env.qdrant"
          scp "${scp_opts[@]}" "${bundle_root}/envs/${{ inputs.environment }}/.env.deploy" "${remote_target}:${REMOTE_DIR}/envs/${{ inputs.environment }}/.env.deploy"

          ssh "${ssh_opts[@]}" "${remote_target}" bash -se -- "${remote_config_dir}" <<'EOF'
          set -euo pipefail
          remote_config_dir=$1
          sudo install -d -m 700 -o root -g root "${remote_config_dir}"
          EOF
          remote_tmp=$(ssh "${ssh_opts[@]}" "${remote_target}" mktemp -d /tmp/makepad-qdrant.XXXXXX)
          scp "${scp_opts[@]}" "${bundle_root}/secrets/codegraph.env" "${remote_target}:${remote_tmp}/codegraph.env"
          scp "${scp_opts[@]}" "${bundle_root}/secrets/opsbrain.env" "${remote_target}:${remote_tmp}/opsbrain.env"
          ssh "${ssh_opts[@]}" "${remote_target}" bash -se -- "${remote_config_dir}" "${remote_tmp}" <<'EOF'
          set -euo pipefail
          remote_config_dir=$1
          remote_tmp=$2
          cleanup() {
            rm -rf "${remote_tmp}"
          }
          trap cleanup EXIT
          sudo install -m 600 -o root -g root "${remote_tmp}/codegraph.env" "${remote_config_dir}/codegraph.env"
          sudo install -m 600 -o root -g root "${remote_tmp}/opsbrain.env" "${remote_config_dir}/opsbrain.env"
          EOF

          ssh "${ssh_opts[@]}" "${remote_target}" bash -se -- "${REMOTE_DIR}" "${{ inputs.environment }}" <<'EOF'
          set -euo pipefail
          remote_dir=$1
          deploy_env=$2
          env_deploy="${remote_dir}/envs/${deploy_env}/.env.deploy"

          env_value() {
            local key=$1
            local file=$2
            awk -v key="${key}" '
              index($0, key "=") == 1 {
                value = substr($0, length(key) + 2)
                found = 1
              }
              END {
                if (found) {
                  printf "%s", value
                }
              }
            ' "${file}"
          }

          require_value() {
            local key=$1
            local value=$2
            if [[ -z "${value}" ]]; then
              echo "Missing required deploy value: ${key}" >&2
              exit 1
            fi
          }

          require_external_network() {
            local network_name=$1
            if docker network inspect "${network_name}" >/dev/null 2>&1; then
              return 0
            fi

            echo "Required Docker network ${network_name} is missing on this host." >&2
            echo "The consuming application repository owns this network and must create it before deploying Qdrant." >&2
            exit 1
          }

          codegraph_network=$(env_value MAKEPAD_QDRANT_CODEGRAPH_NETWORK "${env_deploy}")
          opsbrain_network=$(env_value MAKEPAD_QDRANT_OPSBRAIN_NETWORK "${env_deploy}")
          require_value MAKEPAD_QDRANT_CODEGRAPH_NETWORK "${codegraph_network}"
          require_value MAKEPAD_QDRANT_OPSBRAIN_NETWORK "${opsbrain_network}"

          require_external_network "${codegraph_network}"
          require_external_network "${opsbrain_network}"

          docker compose \
            --env-file "${remote_dir}/envs/${deploy_env}/.env.qdrant" \
            --env-file "${env_deploy}" \
            -f "${remote_dir}/compose.yml" \
            config --quiet

          docker compose \
            --env-file "${remote_dir}/envs/${deploy_env}/.env.qdrant" \
            --env-file "${env_deploy}" \
            -f "${remote_dir}/compose.yml" \
            up -d
          EOF
