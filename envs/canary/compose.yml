services:
  codegraph-qdrant:
    env_file:
      - ./envs/canary/.env.qdrant
    volumes:
      - "${MAKEPAD_QDRANT_CODEGRAPH_DATA_PATH:-/var/lib/makepad/qdrant-codegraph-canary}:/qdrant/storage"
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.infra.makepad.qdrant == true
      restart_policy:
        condition: on-failure
        delay: 5s
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 1G
      update_config:
        parallelism: 1
        order: stop-first
      rollback_config:
        parallelism: 1
        order: stop-first

  opsbrain-qdrant:
    env_file:
      - ./envs/canary/.env.qdrant
    volumes:
      - "${MAKEPAD_QDRANT_OPSBRAIN_DATA_PATH:-/var/lib/makepad/qdrant-opsbrain-canary}:/qdrant/storage"
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.infra.makepad.qdrant == true
      restart_policy:
        condition: on-failure
        delay: 5s
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 1G
      update_config:
        parallelism: 1
        order: stop-first
      rollback_config:
        parallelism: 1
        order: stop-first

networks:
  codegraph:
    external: true
    name: ${MAKEPAD_QDRANT_CODEGRAPH_NETWORK}
  opsbrain:
    external: true
    name: ${MAKEPAD_QDRANT_OPSBRAIN_NETWORK}
